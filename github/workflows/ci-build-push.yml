name: CI/CD Podman Build & GitOps Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build UBI Image and Push to Docker Hub
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Application Repository
        uses: actions/checkout@v4

      - name: Get Short Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Red Hat Podman is preinstalled on standard Ubuntu-Latest runner, but we configure it
      - name: Set up QEMU (for multi-architecture support if needed)
        uses: docker/setup-qemu-action@v3

      # Log in to Docker Hub using user credentials stored securely in GitHub Secrets
      - name: Log in to DockerHub via Podman/Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push the image using Podman (enterprise-compliant daemonless container tool)
      - name: Build Container Image using Podman
        run: |
          echo "Building book-app image using Podman with Red Hat UBI base..."
          podman build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/book-inventory-app:${{ steps.vars.outputs.sha_short }} -f Dockerfile .
          
          echo "Tagging as latest..."
          podman tag docker.io/${{ secrets.DOCKERHUB_USERNAME }}/book-inventory-app:${{ steps.vars.outputs.sha_short }} docker.io/${{ secrets.DOCKERHUB_USERNAME }}/book-inventory-app:latest
          
          echo "Pushing images to docker.io..."
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/book-inventory-app:${{ steps.vars.outputs.sha_short }}
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/book-inventory-app:latest

  update-gitops-manifests:
    name: Automate GitOps ArgoCD Manifest Update
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Get Short Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Checkout the dedicated Deployment/Infrastructure repository
      - name: Checkout GitOps Deployment Manifests Repository
        uses: actions/checkout@v4
        with:
          repository: '${{ github.repository_owner }}/book-inventory-gitops'
          token: ${{ secrets.GITOPS_REPO_PAT }} # Personal Access Token with write permissions to the GitOps repo
          path: gitops-repo

      # Update the image tag in the Kustomize configuration
      - name: Update Image Tag with Kustomize
        run: |
          cd gitops-repo/overlays/dev
          # Using standard sed/awk or Kustomize tool to surgically update the image tag reference
          # Changes the tag of docker.io/<username>/book-inventory-app
          sed -i "s|newTag:.*|newTag: ${{ steps.vars.outputs.sha_short }}|g" kustomization.yaml
          
          echo "Updated dev kustomization.yaml image tag to: ${{ steps.vars.outputs.sha_short }}"

      # Commit and push the manifest modification back to the GitOps repo
      - name: Commit and Push Manifest Changes
        run: |
          cd gitops-repo
          git config --global user.name "gitops-pipeline[bot]"
          git config --global user.email "gitops-pipeline@github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "gitops: auto-deploy build sha-${{ steps.vars.outputs.sha_short }} via GitHub Actions"
          git push origin main
